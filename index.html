    async function deleteAccount() {
      const u = state.selectedUser;
      if (!u) return;
      try {
        // Delete all known sub-collections and the main userAccess doc
        // First delete from userAccess
        await db.collection('userAccess').doc(u.uid).delete();

        // Also try to delete from gbUsernames if the user has one
        if (u.gbUsername) {
          try {
            await db.collection('gbUsernames').doc(u.gbUsername.toLowerCase()).delete();
          } catch(e) { /* username doc may not exist */ }
        }

        // Try to delete user-specific sub-collections (companies, payments, bills etc.)
        const subcollections = ['companies', 'payments', 'bills', 'subscriptions'];
        for (const sub of subcollections) {
          try {
            const snap = await db.collection('userAccess').doc(u.uid).collection(sub).get();
            const batch = db.batch();
            snap.docs.forEach(doc => batch.delete(doc.ref));
            if (snap.docs.length > 0) await batch.commit();
          } catch(e) { /* subcollection may not exist */ }
        }

        showToast('🗑️ Account deleted: ' + u.email, 'success');
        closeUserDetail();
      } catch(e) {
        showToast('❌ Delete failed: ' + e.message, 'error');
      }
    }

    // ============================================================
    // DOWNLOAD USER DATA
    // ============================================================
    async function downloadUserData() {
      const u = state.selectedUser;
      if (!u) return;

      const downloadBtn = document.getElementById('downloadDataBtn');
      if (downloadBtn) {
        downloadBtn.disabled = true;
        downloadBtn.innerHTML = '<span style="animation:pulse 1s infinite">Fetching data...</span>';
      }

      try {
        const userData = {
          _exportedAt: new Date().toISOString(),
          _exportedBy: state.user?.email || 'admin',
          uid: u.uid,
          profile: {}
        };

        // Copy all top-level fields from userAccess doc
        const docSnap = await db.collection('userAccess').doc(u.uid).get();
        if (docSnap.exists) {
          const data = docSnap.data();
          // Convert Firestore timestamps to ISO strings for JSON
          for (const [key, val] of Object.entries(data)) {
            if (val && typeof val === 'object' && typeof val.toDate === 'function') {
              userData.profile[key] = val.toDate().toISOString();
            } else {
              userData.profile[key] = val;
            }
          }
        }

        // Fetch known sub-collections
        const subcollections = ['companies', 'payments', 'bills', 'subscriptions', 'games', 'history'];
        for (const sub of subcollections) {
          try {
            const snap = await db.collection('userAccess').doc(u.uid).collection(sub).get();
            if (snap.docs.length > 0) {
              userData[sub] = snap.docs.map(doc => {
                const d = doc.data();
                const converted = { _id: doc.id };
                for (const [key, val] of Object.entries(d)) {
                  if (val && typeof val === 'object' && typeof val.toDate === 'function') {
                    converted[key] = val.toDate().toISOString();
                  } else {
                    converted[key] = val;
                  }
                }
                return converted;
              });
            }
          } catch(e) { /* subcollection may not exist, skip silently */ }
        }

        // Also check gbUsernames
        if (u.gbUsername) {
          try {
            const unSnap = await db.collection('gbUsernames').doc(u.gbUsername.toLowerCase()).get();
            if (unSnap.exists) {
              userData.gbUsernameRecord = unSnap.data();
            }
          } catch(e) {}
        }

        // Generate and download JSON file
        const jsonStr = JSON.stringify(userData, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `gamebill_user_${u.gbUsername || u.uid}_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        showToast('📥 User data downloaded', 'success');
      } catch(e) {
        showToast('❌ Download failed: ' + e.message, 'error');
      } finally {
        if (downloadBtn) {
          downloadBtn.disabled = false;
          downloadBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:3px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download User Data';
        }
      }
    }

    // ============================================================
    // SUBSCRIPTION REVENUE
    // ============================================================

    // Compute sub-rev data from state.users, filtered by date range
    function getSubRevData() {
      const from = state.subRevFrom ? new Date(state.subRevFrom + 'T00:00:00') : null;
      const to   = state.subRevTo   ? new Date(state.subRevTo   + 'T23:59:59') : null;

      const rows = state.users
        .filter(u => u.subscriptionCost && u.subscriptionCost > 0 && u.subPeriodStart && u.subPeriodEnd)
        .map(u => {
          const start = u.subPeriodStart.toDate ? u.subPeriodStart.toDate() : new Date(u.subPeriodStart);
          const end   = u.subPeriodEnd.toDate   ? u.subPeriodEnd.toDate()   : new Date(u.subPeriodEnd);
          return { u, start, end, cost: Number(u.subscriptionCost) };
        })
        .filter(r => {
          if (from && r.end < from) return false;
          if (to   && r.start > to) return false;
          return true;
        });

      const total = rows.reduce((s, r) => s + r.cost, 0);
      return { rows, total };
    }

    function fmtMoney(n) { return '$' + Number(n).toFixed(2); }
    function fmtDate(d) {
      if (!d) return 'N/A';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderSubRevFullPage() {
      const { rows, total } = getSubRevData();

      const hasFilter = state.subRevFrom || state.subRevTo;
      let rangeNote = '';
      if (hasFilter) {
        const f = state.subRevFrom ? new Date(state.subRevFrom).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : 'beginning';
        const t = state.subRevTo   ? new Date(state.subRevTo).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})   : 'today';
        rangeNote = `<span style="font-size:11px;color:var(--textMuted);display:block;margin-top:3px">From ${f} to ${t}</span>`;
      } else {
        rangeNote = `<span style="font-size:11px;color:var(--textMuted);display:block;margin-top:3px">All time</span>`;
      }

      const rowsHtml = rows.length === 0
        ? `<div style="text-align:center;padding:28px;color:var(--textMuted);font-size:13px">No subscriptions in this date range</div>`
        : rows.map(r => {
            const timeLabel = (() => {
              const ms = r.end - r.start;
              const days = Math.round(ms / 86400000);
              if (days <= 1) return '1 day';
              if (days <= 7) return days + ' days';
              if (days <= 31) return Math.round(days/7) + ' week' + (Math.round(days/7)>1?'s':'');
              if (days <= 366) return Math.round(days/30) + ' month' + (Math.round(days/30)>1?'s':'');
              return Math.round(days/365) + ' year' + (Math.round(days/365)>1?'s':'');
            })();
            return `<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;background:rgba(20,16,44,0.55);border:1px solid rgba(110,90,175,0.2);margin-bottom:8px">
              <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;overflow:hidden">
                ${r.u.photoURL ? `<img src="${r.u.photoURL}" style="width:100%;height:100%;object-fit:cover" referrerpolicy="no-referrer"/>` : (r.u.displayName||r.u.email||'?')[0].toUpperCase()}
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:700;color:var(--textPrimary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.u.displayName||r.u.email||'Unknown'}</div>
                ${r.u.gbUsername ? `<div style="font-size:11px;color:#22d3ee;font-weight:600">@${r.u.gbUsername}</div>` : ''}
                <div style="font-size:11px;color:var(--textMuted);margin-top:1px">${fmtDate(r.start)} — ${fmtDate(r.end)} · ${timeLabel}</div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-family:'Orbitron',monospace;font-size:15px;font-weight:800;color:#34d399">${fmtMoney(r.cost)}</div>
              </div>
              <button class="set-cost-btn" data-uid="${r.u.uid}" data-name="${(r.u.displayName||r.u.email||'User').replace(/"/g,'')}" style="padding:5px 9px;border-radius:7px;border:1px solid rgba(110,90,175,0.35);background:rgba(110,90,175,0.1);color:var(--purpleLight);font-size:11px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;white-space:nowrap;flex-shrink:0">Edit</button>
            </div>`;
          }).join('');

      // Also list users with NO cost set
      const noCostUsers = state.users.filter(u => !u.subscriptionCost || u.subscriptionCost <= 0);
      const noCostHtml = noCostUsers.map(u => `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:rgba(20,16,44,0.35);margin-bottom:6px">
        <div style="font-size:13px;color:var(--textMuted);font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.displayName||u.email||'Unknown'}${u.gbUsername?` <span style="color:#22d3ee">@${u.gbUsername}</span>`:''}</div>
        <button class="set-cost-btn" data-uid="${u.uid}" data-name="${(u.displayName||u.email||'User').replace(/"/g,'')}" style="padding:5px 9px;border-radius:7px;border:1px solid rgba(52,211,153,0.35);background:rgba(16,185,129,0.1);color:#34d399;font-size:11px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;white-space:nowrap;flex-shrink:0">Set Cost</button>
      </div>`).join('');

      return `<div class="user-detail-page fade-in">
        <!-- Back + Title -->
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px">
          <button id="subRevBackBtn" class="btn btn-purple" style="padding:8px 14px;font-size:12px;font-weight:700;flex-shrink:0">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-2px;margin-right:4px"><polyline points="15,18 9,12 15,6"/></svg>Back
          </button>
          <h2 style="font-family:'Orbitron',monospace;font-size:15px;font-weight:800;color:#34d399;letter-spacing:1px">SUBSCRIPTION REVENUE</h2>
        </div>

        <!-- Summary card -->
        <div style="border-radius:16px;background:linear-gradient(135deg,rgba(16,185,129,0.12),rgba(14,11,28,0.95));border:1.5px solid rgba(52,211,153,0.35);padding:20px 22px;margin-bottom:16px">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px">
            <div>
              <div style="font-size:11px;color:var(--textMuted);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:6px">Total Revenue</div>
              <div style="font-family:'Orbitron',monospace;font-size:32px;font-weight:900;color:#34d399;line-height:1">${fmtMoney(total)}</div>
              <div style="font-size:12px;color:var(--textMuted);margin-top:5px">${rows.length} paid account${rows.length!==1?'s':''} · ${rangeNote}</div>
            </div>
            <div style="text-align:right;padding:12px 16px;border-radius:12px;background:rgba(16,185,129,0.08);border:1px solid rgba(52,211,153,0.2)">
              <div style="font-size:11px;color:var(--textMuted);margin-bottom:4px">Avg per account</div>
              <div style="font-family:'Orbitron',monospace;font-size:18px;font-weight:800;color:#34d399">${rows.length > 0 ? fmtMoney(total/rows.length) : '$0.00'}</div>
            </div>
          </div>
          <!-- Date filters -->
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:130px">
              <label style="font-size:11px;color:var(--textMuted);font-weight:700;text-transform:uppercase;letter-spacing:1px;white-space:nowrap">From</label>
              <input type="date" id="subRevFrom" value="${state.subRevFrom}" style="flex:1;padding:7px 10px;border-radius:8px;border:1.5px solid rgba(110,90,175,0.4);background:var(--bgInput);color:var(--textPrimary);font-size:13px;font-weight:600;outline:none;font-family:'Rajdhani',sans-serif;min-width:0"/>
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:130px">
              <label style="font-size:11px;color:var(--textMuted);font-weight:700;text-transform:uppercase;letter-spacing:1px;white-space:nowrap">To</label>
              <input type="date" id="subRevTo" value="${state.subRevTo}" style="flex:1;padding:7px 10px;border-radius:8px;border:1.5px solid rgba(110,90,175,0.4);background:var(--bgInput);color:var(--textPrimary);font-size:13px;font-weight:600;outline:none;font-family:'Rajdhani',sans-serif;min-width:0"/>
            </div>
            ${state.subRevFrom||state.subRevTo ? `<button id="clearRevFilter" style="padding:7px 12px;border-radius:8px;border:1.5px solid rgba(110,90,175,0.35);background:transparent;color:var(--textMuted);font-size:12px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;white-space:nowrap;flex-shrink:0">✕ Clear</button>` : ''}
          </div>
        </div>

        <!-- Account breakdown -->
        <div style="border-radius:16px;background:var(--bgCard);border:1.5px solid rgba(130,105,215,0.28);overflow:hidden;margin-bottom:16px">
          <div style="padding:14px 18px;border-bottom:1px solid rgba(130,105,215,0.18);display:flex;align-items:center;justify-content:space-between">
            <div style="font-size:11px;color:var(--textMuted);text-transform:uppercase;letter-spacing:1.2px;font-weight:700">Account Breakdown</div>
            <div style="font-size:12px;color:var(--textMuted)">${rows.length} account${rows.length!==1?'s':''}</div>
          </div>
          <div style="padding:12px 16px">
            ${rowsHtml}
          </div>
        </div>

        <!-- No cost set -->
        ${noCostUsers.length > 0 ? `<div style="border-radius:16px;background:var(--bgCard);border:1.5px solid rgba(130,105,215,0.2);overflow:hidden">
          <div style="padding:14px 18px;border-bottom:1px solid rgba(130,105,215,0.15);display:flex;align-items:center;justify-content:space-between">
            <div style="font-size:11px;color:var(--textMuted);text-transform:uppercase;letter-spacing:1.2px;font-weight:700">No Cost Set</div>
            <div style="font-size:12px;color:var(--textMuted)">${noCostUsers.length} account${noCostUsers.length!==1?'s':''}</div>
          </div>
          <div style="padding:12px 16px">${noCostHtml}</div>
        </div>` : ''}
      </div>`;
    }

    function bindSubRevPage() {
      bindMobileMenu();
      const backBtn = document.getElementById('subRevBackBtn');
      if (backBtn) backBtn.onclick = () => { state.view = 'dashboard'; render(); };

      const srFrom = document.getElementById('subRevFrom');
      const srTo   = document.getElementById('subRevTo');
      if (srFrom) srFrom.onchange = (e) => { state.subRevFrom = e.target.value; render(); };
      if (srTo)   srTo.onchange   = (e) => { state.subRevTo   = e.target.value; render(); };

      const clearBtn = document.getElementById('clearRevFilter');
      if (clearBtn) clearBtn.onclick = () => { state.subRevFrom = ''; state.subRevTo = ''; render(); };

      document.querySelectorAll('.set-cost-btn').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          showSetCostModal(btn.dataset.uid, btn.dataset.name);
        };
      });
    }

    // Modal to set/edit subscription cost for a user
    function showSetCostModal(uid, displayName) {
      const u = state.users.find(x => x.uid === uid);
      if (!u) return;

      let existing = document.getElementById('setCostModal');
      if (existing) existing.remove();

      const existingCost = u.subscriptionCost || '';

      // Helper: format a Date as YYYY-MM-DD for input[type=date]
      const toDateInput = (d) => d.toISOString().split('T')[0];
      const today = toDateInput(new Date());

      const existingStart = u.subPeriodStart ? (() => {
        const d = u.subPeriodStart.toDate ? u.subPeriodStart.toDate() : new Date(u.subPeriodStart);
        return toDateInput(d);
      })() : today; // default: today

      const existingEnd = u.subPeriodEnd ? (() => {
        const d = u.subPeriodEnd.toDate ? u.subPeriodEnd.toDate() : new Date(u.subPeriodEnd);
        return toDateInput(d);
      })() : (u.expiryDate ? (() => {
        // default: user's access expiry date
        const d = u.expiryDate.toDate ? u.expiryDate.toDate() : new Date(u.expiryDate);
        return toDateInput(d);
      })() : today); // fallback: today

      const el = document.createElement('div');
      el.id = 'setCostModal';
      el.className = 'modal-overlay';
      el.innerHTML = `
        <div class="modal fade-in" style="max-width:420px">
          <div class="modal-header" style="background:linear-gradient(135deg,rgba(16,185,129,0.1),rgba(14,11,28,0.9))">
            <h3 style="font-family:'Orbitron',monospace;color:#34d399;font-size:14px">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" style="vertical-align:-2px;margin-right:6px"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Set Subscription Cost
            </h3>
            <button class="modal-close" id="setCostClose">✕</button>
          </div>
          <div class="modal-body">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;padding:12px;border-radius:10px;background:rgba(20,16,44,0.5);border:1px solid rgba(110,90,175,0.2)">
              <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0">
                ${u.photoURL ? `<img src="${u.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" referrerpolicy="no-referrer"/>` : (u.displayName||u.email||'?')[0].toUpperCase()}
              </div>
              <div>
                <div style="font-size:14px;font-weight:700;color:var(--textPrimary)">${displayName}</div>
                <div style="font-size:12px;color:var(--textMuted)">${u.email||''}</div>
              </div>
            </div>
            <div style="margin-bottom:12px">
              <label style="font-size:11px;color:var(--textMuted);text-transform:uppercase;letter-spacing:1px;font-weight:700;display:block;margin-bottom:6px">Subscription Cost (USD)</label>
              <div style="position:relative">
                <span style="position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--textMuted);font-size:15px;font-weight:700;pointer-events:none">$</span>
                <input type="number" id="costInput" min="0" step="0.01" placeholder="0.00" value="${existingCost}" style="width:100%;padding:10px 14px 10px 26px;border-radius:10px;border:1.5px solid rgba(110,90,175,0.45);background:var(--bgInput);color:var(--textPrimary);font-size:15px;font-weight:700;outline:none;font-family:'Rajdhani',sans-serif;box-sizing:border-box"/>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px">
              <div>
                <label style="font-size:11px;color:var(--textMuted);text-transform:uppercase;letter-spacing:1px;font-weight:700;display:block;margin-bottom:6px">Period Start</label>
                <input type="date" id="costStart" value="${existingStart}" style="width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid rgba(110,90,175,0.45);background:var(--bgInput);color:var(--textPrimary);font-size:13px;font-weight:600;outline:none;font-family:'Rajdhani',sans-serif"/>
              </div>
              <div>
                <label style="font-size:11px;color:var(--textMuted);text-transform:uppercase;letter-spacing:1px;font-weight:700;display:block;margin-bottom:6px">Period End</label>
                <input type="date" id="costEnd" value="${existingEnd}" style="width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid rgba(110,90,175,0.45);background:var(--bgInput);color:var(--textPrimary);font-size:13px;font-weight:600;outline:none;font-family:'Rajdhani',sans-serif"/>
              </div>
            </div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-green" id="saveCostBtn" style="font-weight:800;flex:1;justify-content:center">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>Save
              </button>
              ${existingCost ? `<button class="btn btn-red" id="clearCostBtn" style="font-weight:700">Remove</button>` : ''}
            </div>
          </div>
        </div>`;
      document.body.appendChild(el);

      el.onclick = (e) => { if (e.target === el) el.remove(); };
      document.getElementById('setCostClose').onclick = () => el.remove();

      document.getElementById('saveCostBtn').onclick = async () => {
        const cost = parseFloat(document.getElementById('costInput')?.value);
        const startVal = document.getElementById('costStart')?.value;
        const endVal   = document.getElementById('costEnd')?.value;
        if (!cost || cost <= 0) { showToast('Enter a valid cost', 'error'); return; }
        if (!startVal || !endVal) { showToast('Select a period start and end', 'error'); return; }
        if (new Date(startVal) > new Date(endVal)) { showToast('Start must be before end', 'error'); return; }
        const btn = document.getElementById('saveCostBtn');
        btn.disabled = true; btn.textContent = 'Saving...';
        try {
          await db.collection('userAccess').doc(uid).update({
            subscriptionCost: cost,
            subPeriodStart: firebase.firestore.Timestamp.fromDate(new Date(startVal + 'T00:00:00')),
            subPeriodEnd:   firebase.firestore.Timestamp.fromDate(new Date(endVal   + 'T23:59:59')),
          });
          showToast('✅ Subscription cost saved', 'success');
          el.remove();
        } catch(e) { showToast('❌ Failed: ' + e.message, 'error'); btn.disabled=false; btn.textContent='Save'; }
      };

      const clearBtn = document.getElementById('clearCostBtn');
      if (clearBtn) clearBtn.onclick = async () => {
        if (!confirm('Remove subscription cost for this user?')) return;
        try {
          await db.collection('userAccess').doc(uid).update({
            subscriptionCost: firebase.firestore.FieldValue.delete(),
            subPeriodStart:   firebase.firestore.FieldValue.delete(),
            subPeriodEnd:     firebase.firestore.FieldValue.delete(),
          });
          showToast('Cost removed', 'success');
          el.remove();
        } catch(e) { showToast('❌ Failed: ' + e.message, 'error'); }
      };
    }

    // ============================================================
    // POPUP MESSAGE SYSTEM
    // ============================================================

    // Send a popup message to a single user
    async function sendPopupMessage(uid) {
      const msgText = (document.getElementById('popupMsgText')?.value || '').trim();
      const msgType = document.getElementById('popupMsgType')?.value || 'info';
      if (!msgText) { showToast('⚠️ Please enter a message', 'error'); return; }

      const btn = document.getElementById('sendPopupBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }
      try {
        await db.collection('popupMessages').add({
          targetUid: uid,
          targetAll: false,
          message: msgText,
          type: msgType,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          read: false,
          dismissed: false,
          sentBy: state.user?.email || 'admin'
        });
        showToast('✅ Popup message sent!', 'success');
        if (document.getElementById('popupMsgText')) document.getElementById('popupMsgText').value = '';
      } catch(e) {
        showToast('❌ Failed: ' + e.message, 'error');
      } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:3px"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>Send to This User'; }
      }
    }

                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>Success
              </button>
              <button type="button" class="bcast-type-btn" data-type="warning" style="display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:9px;border:1.5px solid rgba(251,191,36,0.3);background:rgba(245,158,11,0.08);color:#fbbf24;font-size:13px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;transition:all 0.2s;opacity:0.55">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Warning
              </button>
              <button type="button" class="bcast-type-btn" data-type="error" style="display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:9px;border:1.5px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.08);color:#f87171;font-size:13px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;transition:all 0.2s;opacity:0.55">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>Alert
              </button>
            </div>
            <input type="hidden" id="broadcastMsgType" value="info"/>
            <textarea id="broadcastMsgText" placeholder="Type your broadcast message here..." rows="4" style="width:100%;padding:10px 13px;border-radius:10px;border:1px solid rgba(90,75,145,0.4);background:var(--bgInput);color:var(--textPrimary);font-size:14px;font-weight:600;outline:none;resize:vertical;font-family:'Rajdhani',sans-serif;box-sizing:border-box;margin-bottom:14px"></textarea>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-purple" id="broadcastSendBtn" style="font-weight:800;flex:1;min-width:110px;justify-content:center;display:flex;align-items:center;gap:6px">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>Send to All
              </button>
              <button class="btn btn-red" id="broadcastDeleteAllBtn" style="font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:5px">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6"/><path d="M14,11v6"/><path d="M9,6V4h6v2"/></svg>Delete All Broadcasts
              </button>
              <button class="btn btn-red" id="broadcastCancelBtn" style="font-weight:700;white-space:nowrap">Cancel</button>
            </div>
          </div>
        </div>`;
      document.body.appendChild(el);

      document.getElementById('broadcastModalClose').onclick = () => el.remove();
      document.getElementById('broadcastCancelBtn').onclick = () => el.remove();
      el.onclick = (e) => { if (e.target === el) el.remove(); };

      // Type button toggles — first one active by default
      el.querySelectorAll('.bcast-type-btn').forEach(btn => {
        btn.onclick = () => {
          el.querySelectorAll('.bcast-type-btn').forEach(b => b.style.opacity = '0.55');
          btn.style.opacity = '1';
          el.querySelector('#broadcastMsgType').value = btn.dataset.type;
        };
      });

      document.getElementById('broadcastSendBtn').onclick = async () => {
        const msgText = (el.querySelector('#broadcastMsgText')?.value || '').trim();
        const msgType = el.querySelector('#broadcastMsgType')?.value || 'info';
        if (!msgText) { showToast('⚠️ Please enter a message', 'error'); return; }
        const btn = document.getElementById('broadcastSendBtn');
        btn.disabled = true; btn.textContent = 'Sending...';
        try {
          await db.collection('popupMessages').add({
            targetUid: null, targetAll: true,
            message: msgText, type: msgType,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            read: false, dismissed: false,
            sentBy: state.user?.email || 'admin'
          });
          el.remove();
          showToast('✅ Broadcast sent to all users!', 'success');
        } catch(e) {
          showToast('❌ Failed: ' + e.message, 'error');
          btn.disabled = false;
          btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>Send to All';
        }
      };

      document.getElementById('broadcastDeleteAllBtn').onclick = async () => {
        if (!confirm('Delete ALL broadcast messages sent to all users? This cannot be undone.')) return;
        const btn = document.getElementById('broadcastDeleteAllBtn');
        btn.disabled = true; btn.textContent = 'Deleting...';
        try {
          const snap = await db.collection('popupMessages').where('targetAll','==',true).get();
          const batch = db.batch();
          snap.docs.forEach(d => batch.delete(d.ref));
          await batch.commit();
          el.remove();
          showToast(`✅ Deleted ${snap.size} broadcast message${snap.size !== 1 ? 's' : ''}`, 'success');
        } catch(e) {
          showToast('❌ Failed: ' + e.message, 'error');
          btn.disabled = false;
          btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/></svg>Delete All Broadcasts';
        }
      };
    }

    // ============================================================
    // DATA LOADING (Real-time listener)
    // ============================================================
    let unsubUsers = null;

    function listenUsers() {
      unsubUsers = db.collection('userAccess').orderBy('lastLogin', 'desc').onSnapshot(snap => {
        state.users = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
        filterUsers();
        if (state.view === 'dashboard') render();
      }, err => {
        console.error('Firestore listen error:', err);
      });
    }

    // ============================================================
    // AUTH STATE
    // ============================================================
    auth.getRedirectResult().catch(() => {});
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        state.user = { uid: user.uid, email: user.email };

        // Only admin allowed
        if (user.email !== ADMIN_EMAIL) {
          state.view = 'denied';
          render();
          return;
        }

        state.view = 'loading';
        render();
        listenUsers();
        state.view = 'dashboard';
        render();
        loadMsgCounts(); // load per-user message counts for list indicators
      } else {
        if (unsubUsers) { unsubUsers(); unsubUsers = null; }
        state.user = null;
        state.users = [];
        state.filteredUsers = [];
        state.view = 'login';
        render();
      }
    });

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/Admin/sw.js', { scope: '/Admin/' })
        .then(reg => console.log('Admin SW registered:', reg.scope))
        .catch(e => console.log('Admin SW:', e.message));
    }

    // Initial render
    render();

    // ============================================================
    // FRONTEND POPUP INTEGRATION (add to your GameBill index.html)
    // ============================================================
    // In GameBill's onAuthStateChanged, after login, call checkPopupMessages(user.uid)
    //

    //   const [snap1, snap2] = await Promise.all([
    //     db.collection('popupMessages').where('targetUid','==',uid).where('read','==',false).get(),
    //     db.collection('popupMessages').where('targetAll','==',true).where('read','==',false).get()
    //   ]);
    //   const msgs = [...snap1.docs, ...snap2.docs];
    //   for (const doc of msgs) {
    //     const d = doc.data();
    //     showAppPopup(doc.id, d.message, d.type);  // show one at a time
    //     break; // show first unread message, rest on next login
    //   }
    // }
    //
    // function showAppPopup(docId, message, type) {
    //   // Create popup UI with "Got it" and "Remind me later" buttons
    //   // "Got it" → db.collection('popupMessages').doc(docId).update({ read: true })
    //   // "Remind later" → db.collection('popupMessages').doc(docId).update({ dismissed: true })
    // }
  </script>
</body>
</html>
