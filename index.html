<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#080810" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GB Admin" />
  <title>SweepAdmin Access Manager</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #13132a;
      --bgCard: rgba(22,18,42,0.82);
      --bgInput: rgba(28,22,50,0.88);
      --bgHover: rgba(38,32,62,0.88);
      --purple: #7c3aed;
      --purpleLight: #a78bfa;
      --purpleDark: #1a0a3e;
      --cyan: #06b6d4;
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
      --pink: #ec4899;
      --blue: #3b82f6;
      --textPrimary: #f7f5fc;
      --textSecondary: #d8d0f2;
      --textMuted: #b8aede;
      --border: rgba(100,80,180,0.65);
      --borderLight: rgba(110,90,175,0.55);
      --glass: rgba(24,18,48,0.72);
      --glassBorder: rgba(140,110,220,0.28);
      --glassHover: rgba(38,30,68,0.82);
    }

    body {
      background: #13132a;
      color: var(--textPrimary);
      font-family: 'Rajdhani', 'Exo 2', sans-serif;
      font-weight: 500;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(124,58,237,0.16) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 15%, rgba(6,182,212,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 85%, rgba(236,72,153,0.09) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(120,90,200,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,90,200,0.045) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    #app { position: relative; z-index: 1; }

    h1, h2, h3, h4, .heading { font-family: 'Orbitron', monospace; letter-spacing: 1px; }
    input, select, textarea, button { font-family: 'Rajdhani', sans-serif; font-weight: 500; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--purple); }

    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease-out; }

    .header {
      background: var(--glass); border-bottom: 1px solid var(--glassBorder);
      padding: 0 16px; height: 56px; display: flex; align-items: center;
      justify-content: space-between; backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo { display:flex; align-items:center; gap:10px; }
    .header-logo-icon {
      width:34px; height:34px; border-radius:8px;
      background: linear-gradient(135deg, var(--red), var(--orange));
      display:flex; align-items:center; justify-content:center; color:#fff; font-size:17px;
    }

    .login-page {
      min-height:100vh; display:flex; align-items:center;
      justify-content:center; padding:20px;
    }
    .login-box { text-align:center; max-width:420px; width:100%; }
    .login-logo {
      width:90px; height:90px; margin:0 auto 22px; border-radius:22px;
      overflow:hidden;
      box-shadow: 0 0 60px rgba(124,58,237,0.35), 0 0 120px rgba(6,182,212,0.15);
    }
    .login-logo img { width:100%; height:100%; object-fit:cover; }
    .google-btn {
      width:100%; padding:16px 24px; border-radius:14px;
      border:1px solid rgba(130,110,210,0.35); background:rgba(24,20,48,0.7);
      color:var(--textPrimary); font-size:16px; font-weight:700;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      gap:12px; transition:all 0.3s; font-family:'Rajdhani',sans-serif;
    }
    .google-btn:hover { border-color:var(--purpleLight); background:rgba(35,28,65,0.85); box-shadow:0 0 40px rgba(239,68,68,0.2), 0 0 80px rgba(245,158,11,0.08); }

    .loading-page {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
    }
    .spinner {
      width:40px; height:40px; border:3px solid var(--border);
      border-top:3px solid var(--red); border-radius:50%;
      animation: spin 0.8s linear infinite; margin:0 auto 14px;
    }

    .card {
      background: var(--bgCard); border:1px solid rgba(120,100,200,0.22);
      border-radius: 16px; padding: 20px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }

    /* LAYOUT — sidebar on desktop, stacked on mobile */
    .admin-layout { display: flex; min-height: calc(100vh - 56px); }
    .admin-sidebar {
      width: 260px; flex-shrink: 0; padding: 20px 16px;
      border-right: 1px solid var(--glassBorder);
      background: rgba(20,16,40,0.55); backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto;
    }
    .admin-main { flex: 1; min-width: 0; padding: 20px 16px; }
    .stat-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border-radius: 10px; cursor: pointer;
      transition: all 0.2s; margin-bottom: 6px;
      border: 1px solid transparent;
    }
    .stat-chip:hover { background: var(--glassHover); }
    .stat-chip.active { border-color: rgba(124,58,237,0.4); background: rgba(124,58,237,0.08); }
    .stat-chip-num { font-family:'Orbitron',monospace; font-size:18px; font-weight:700; min-width:32px; }
    .stat-chip-label { font-size:13px; font-weight:600; color:var(--textSecondary); }
    /* Hamburger for mobile */
    .mobile-hamburger { display:none; }
    .mobile-sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:140; }
    .mobile-sidebar-overlay.open { display:block; }
    .mobile-sidebar {
      display:none; position:fixed; top:0; left:-280px; width:270px; height:100vh;
      background:rgba(20,16,40,0.55); backdrop-filter:blur(16px) saturate(1.2);
      -webkit-backdrop-filter:blur(16px) saturate(1.2);
      z-index:141; transition:left 0.3s ease; overflow-y:auto; padding:20px 16px;
      border-right:1px solid var(--glassBorder);
    }
    .mobile-sidebar.open { left:0; }

    @media (max-width: 767px) {
      .admin-sidebar { display: none; }
      .admin-main { padding: 16px 12px; }
      .mobile-hamburger { display:flex; }
      .mobile-sidebar { display:block; }
    }
    @media (min-width: 768px) {
      .admin-main { padding: 24px 28px; }
      .admin-sidebar { width: 280px; padding: 24px 20px; }
    }

    .page { max-width: 900px; margin: 0 auto; padding: 0; }

    .search-wrapper { position:relative; }
    .search-wrapper .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--textMuted); pointer-events:none; }
    .search-box {
      width:100%; padding:13px 18px 13px 42px; border-radius:12px;
      border:1.5px solid rgba(110,90,175,0.45); background:var(--bgInput);
      color:var(--textPrimary); font-size:15px; font-weight:600; outline:none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,0.18); }
    .search-box::placeholder { color: var(--textMuted); font-weight: 600; }

    .stats-row {
      display:grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap:10px; margin-bottom:20px;
    }
    .stat-card {
      background: var(--bgCard); border:1.5px solid rgba(130,105,215,0.32);
      border-radius:12px; padding:16px 18px; text-align:center;
    }
    .stat-value {
      font-family:'Orbitron',monospace; font-size:24px; font-weight:700;
      margin-bottom:3px;
    }
    .stat-label { font-size:11px; color:var(--textSecondary); text-transform:uppercase; letter-spacing:1px; font-weight:700; }

    .user-item {
      display:flex; align-items:center; gap:12px;
      padding:14px 16px; border-radius:12px;
      border:1.5px solid rgba(130,105,215,0.3); background:var(--bgCard);
      margin-bottom:10px; transition: all 0.2s; cursor:pointer;
      min-width:0;
    }
    .user-item:hover { border-color: rgba(124,58,237,0.55); background:var(--glassHover); }
    .user-item-status {
      text-align:right; flex-shrink:0; min-width:0;
      display:flex; flex-direction:column; align-items:flex-end; gap:2px;
    }
    .user-avatar {
      width:40px; height:40px; border-radius:50%;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      display:flex; align-items:center; justify-content:center;
      font-size:16px; font-weight:700; flex-shrink:0;
      overflow:hidden;
    }
    .user-avatar img { width:100%; height:100%; object-fit:cover; }
    .user-info { flex:1; min-width:0; overflow:hidden; }
    .user-name {
      font-size:15px; font-weight:700; color:var(--textPrimary);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .user-email {
      font-size:12.5px; color:var(--textSecondary); font-weight:600;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .user-status {
      font-size:11px; font-weight:700; padding:3px 10px;
      border-radius:20px; white-space:nowrap; text-transform:uppercase;
      letter-spacing:0.5px;
    }
    .status-active { background:rgba(16,185,129,0.15); color:#34d399; border:1.5px solid rgba(16,185,129,0.42); }
    .status-expiring { background:rgba(245,158,11,0.15); color:#fbbf24; border:1.5px solid rgba(245,158,11,0.42); }
    .status-expired { background:rgba(239,68,68,0.15); color:#f87171; border:1.5px solid rgba(239,68,68,0.42); }
    .status-disabled { background:rgba(158,150,190,0.12); color:var(--textMuted); border:1.5px solid rgba(158,150,190,0.32); }
    .status-none { background:rgba(158,150,190,0.08); color:var(--textMuted); border:1.5px solid rgba(158,150,190,0.25); }

    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.7);
      display:flex; align-items:center; justify-content:center;
      z-index:200; padding:20px;
      backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
    }
    .modal {
      background:rgba(14,11,28,0.97); border:1.5px solid rgba(130,105,215,0.35);
      border-radius:20px; max-width:500px; width:100%;
      box-shadow:0 20px 60px rgba(0,0,0,0.65), 0 0 40px rgba(124,58,237,0.12); overflow:hidden;
      max-height:90vh; overflow-y:auto;
    }
    .modal-header {
      padding:20px 24px; border-bottom:1.5px solid rgba(130,105,215,0.25);
      display:flex; align-items:center; justify-content:space-between;
    }
    .modal-header h3 { font-size:16px; font-weight:700; }
    .modal-close {
      width:32px; height:32px; border-radius:8px; border:none;
      background:rgba(239,68,68,0.14); color:var(--red); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:18px; transition:background 0.2s;
    }
    .modal-close:hover { background:rgba(239,68,68,0.26); }
    .modal-body { padding:20px 24px; }

    .btn {
      padding:9px 15px; border-radius:10px; border:1.5px solid;
      font-size:13px; font-weight:600; cursor:pointer;
      transition:all 0.2s; font-family:'Rajdhani',sans-serif;
    }
    .btn-green { border-color:rgba(16,185,129,0.5); background:rgba(16,185,129,0.14); color:#34d399; }
    .btn-green:hover { background:rgba(16,185,129,0.26); border-color:rgba(16,185,129,0.7); }
    .btn-blue { border-color:rgba(59,130,246,0.5); background:rgba(59,130,246,0.14); color:#60a5fa; }
    .btn-blue:hover { background:rgba(59,130,246,0.26); border-color:rgba(59,130,246,0.7); }
    .btn-orange { border-color:rgba(245,158,11,0.5); background:rgba(245,158,11,0.14); color:#fbbf24; }
    .btn-orange:hover { background:rgba(245,158,11,0.26); border-color:rgba(245,158,11,0.7); }
    .btn-purple { border-color:rgba(124,58,237,0.5); background:rgba(124,58,237,0.16); color:var(--purpleLight); }
    .btn-purple:hover { background:rgba(124,58,237,0.28); border-color:rgba(124,58,237,0.7); }
    .btn-red { border-color:rgba(239,68,68,0.5); background:rgba(239,68,68,0.14); color:#f87171; }
    .btn-red:hover { background:rgba(239,68,68,0.26); border-color:rgba(239,68,68,0.7); }
    .btn-cyan { border-color:rgba(6,182,212,0.5); background:rgba(6,182,212,0.14); color:#22d3ee; }
    .btn-cyan:hover { background:rgba(6,182,212,0.26); border-color:rgba(6,182,212,0.7); }
    .btn-gold { border-color:rgba(251,191,36,0.5); background:rgba(251,191,36,0.14); color:#fbbf24; }
    .btn-gold:hover { background:rgba(251,191,36,0.26); border-color:rgba(251,191,36,0.7); }
    .btn-emerald { border-color:rgba(52,211,153,0.5); background:rgba(52,211,153,0.14); color:#34d399; }
    .btn-emerald:hover { background:rgba(52,211,153,0.26); border-color:rgba(52,211,153,0.7); }
    .btn-row { display:flex; gap:8px; flex-wrap:wrap; }
    /* USER DETAIL PAGE */
    .user-detail-page { min-height:calc(100vh - 62px); padding:20px 16px; max-width:800px; margin:0 auto; }
    .detail-section { background:var(--bgCard); border:1.5px solid rgba(130,105,215,0.3); border-radius:16px; padding:20px 22px; margin-bottom:16px; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
    .detail-section-title { font-size:11px; color:var(--textMuted); text-transform:uppercase; letter-spacing:1.2px; font-weight:800; margin-bottom:14px; display:flex; align-items:center; gap:6px; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    @media(max-width:500px){ .detail-grid { grid-template-columns:1fr; } }
    .detail-info-row { display:flex; flex-direction:column; gap:2px; padding:10px 12px; border-radius:10px; background:rgba(30,24,56,0.55); border:1px solid rgba(110,90,175,0.22); }
    .detail-info-label { font-size:10px; color:var(--textMuted); text-transform:uppercase; letter-spacing:1px; font-weight:700; }
    .detail-info-value { font-size:13px; color:var(--textPrimary); font-weight:600; word-break:break-all; }

    .toast {
      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      padding:12px 24px; border-radius:12px; font-size:14px; font-weight:600;
      z-index:300; animation:fadeIn 0.3s ease-out;
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    }
    .toast-success { background:rgba(16,185,129,0.2); border:1px solid rgba(16,185,129,0.3); color:var(--green); }
    .toast-error { background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.3); color:var(--red); }

    .hidden { display: none !important; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7) brightness(1.2); cursor:pointer; }
    input[type="date"] { color-scheme: dark; }

    @media (max-width: 500px) {
      .btn-row { flex-direction:column; }
      .btn-row .btn { width:100%; text-align:center; justify-content:center; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .user-item { padding:10px 12px; gap:8px; }
      .user-name { font-size:13px; }
      .user-email { font-size:11px; }
      .user-item-status .user-status { font-size:10px; padding:2px 7px; }
    }
    @media (max-width: 380px) {
      /* Very narrow phones: stack status below info */
      .user-item { flex-wrap:wrap; }
      .user-avatar { width:34px; height:34px; font-size:14px; }
      .user-info { flex:1; min-width:calc(100% - 54px); }
      .user-item-status { flex-direction:row; align-items:center; gap:8px; width:100%; padding-left:42px; margin-top:4px; }
    }

    /* MOBILE READABILITY */
    @media (max-width: 767px) {
      body { font-weight: 500; }
      .card { border-color: rgba(120,100,200,0.22); }
      .stat-label { font-weight: 700; color: var(--textSecondary); font-size: 10.5px; }
      .user-name { font-weight: 700; }
      .user-email { font-weight: 600; color: var(--textSecondary); }
      .user-status { font-weight: 700; }
      .btn { font-weight: 700; }
      .search-box { font-weight: 600; border-color: rgba(90,75,145,0.35); padding-left: 42px; }
      .search-box::placeholder { font-weight: 600; }
      .modal-header h3 { font-size: 15px; font-weight: 700; }
      .modal-body { font-weight: 600; }
      .login-page .google-btn { font-weight: 700; font-size: 15px; border-color: rgba(130,110,210,0.35); }
      .toast { font-weight: 700; }
    }

    /* DESKTOP REFINEMENTS */
    @media (min-width: 768px) {
      body { font-size: 16px; line-height: 1.5; }
      .page { max-width: 1060px; padding: 28px 40px; }
      .header { height: 62px; padding: 0 28px; }
      .header-logo-icon { width: 36px; height: 36px; font-size: 18px; }
      .card { padding: 24px; border-color: rgba(120,100,200,0.25); }
      .stat-card { padding: 18px 20px; }
      .stat-value { font-size: 26px; }
      .stat-label { font-size: 11.5px; }
      .search-box { font-size: 16px; padding: 14px 20px 14px 46px; }
      .user-item { padding: 16px 20px; gap: 16px; }
      .user-name { font-size: 16px; }
      .user-email { font-size: 13px; }
      .user-status { font-size: 12px; padding: 4px 12px; }
      .btn { font-size: 14px; padding: 11px 20px; font-weight: 700; }
      .modal { max-width: 540px; border-color: rgba(120,100,200,0.28); }
      .modal-header { padding: 22px 28px; }
      .modal-header h3 { font-size: 17px; }
      .modal-body { padding: 22px 28px; }
      .toast { font-size: 15px; padding: 14px 28px; }
      .login-page .google-btn { font-size: 17px; padding: 17px 28px; }
    }
    @media (min-width: 1024px) {
      .page { max-width: 1120px; padding: 34px 48px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ============================================================
    // FIREBASE INIT
    // ============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyDjrOg8Q0sIXI6Jo5f4DT2x-kv9rkbaMx0",
      authDomain: "auth.sweepadmin.com",
      projectId: "sweepadministrator",
      storageBucket: "sweepadministrator.firebasestorage.app",
      messagingSenderId: "909535669253",
      appId: "1:909535669253:web:8389b6274f269178c3806c",
      measurementId: "G-0LMKKJRY4X"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ADMIN_EMAIL = 'service@sweepadmin.com';
    const $ = (s) => document.querySelector(s);
    const $$ = (s) => document.querySelectorAll(s);

    // ============================================================
    // STATE
    // ============================================================
    const state = {
      user: null,
      view: 'loading',
      users: [],
      filteredUsers: [],
      searchQuery: '',
      selectedUser: null,
      modalOpen: false,
      activeFilter: 'all',
      displayCount: 20,
      subRevPage: false,
      subRevFrom: '',
      subRevTo: '',
      msgCounts: {}, // uid → { total, unread } — loaded once per session
    };
    
    function openUserDetail(uid) {
      state.selectedUser = state.users.find(u => u.uid === uid) || null;
      if (state.selectedUser) { state.view = 'userDetail'; render(); }
    }
    function closeUserDetail() {
      state.view = 'dashboard';
      state.selectedUser = null;
      render();
    }

    // Shared — binds hamburger on every page that uses renderHeader()
    function bindMobileMenu() {
      const menuBtn = document.getElementById('mobileMenuBtn');
      if (menuBtn) menuBtn.onclick = () => {
        document.getElementById('mobileSidebar')?.classList.add('open');
        document.getElementById('mobileSidebarOverlay')?.classList.add('open');
      };
      const overlay = document.getElementById('mobileSidebarOverlay');
      if (overlay) overlay.onclick = () => {
        document.getElementById('mobileSidebar')?.classList.remove('open');
        overlay.classList.remove('open');
      };
      // Wire sub-rev chip inside mobile sidebar too
      document.querySelectorAll('.sub-rev-chip').forEach(chip => {
        chip.onclick = () => {
          document.getElementById('mobileSidebar')?.classList.remove('open');
          document.getElementById('mobileSidebarOverlay')?.classList.remove('open');
          state.view = 'subRevPage'; render();
        };
      });
    }

    // Load per-user message counts for the indicator icons in the user list
    async function loadMsgCounts() {
      try {
        const snap = await db.collection('popupMessages').where('targetAll','==',false).get();
        const counts = {};
        snap.docs.forEach(doc => {
          const d = doc.data();
          const uid = d.targetUid;
          if (!uid) return;
          if (!counts[uid]) counts[uid] = { total: 0, unread: 0 };
          counts[uid].total++;
          if (!d.read) counts[uid].unread++;
        });
        state.msgCounts = counts;
        // Patch icons directly into existing user-item cards — no full re-render needed
        document.querySelectorAll('.user-item[data-uid]').forEach(item => {
          const uid = item.dataset.uid;
          const mc = counts[uid];
          // Find or create the msg indicator slot
          let slot = item.querySelector('.msg-indicator-slot');
          if (!slot) {
            const infoDiv = item.querySelector('.user-info');
            if (!infoDiv) return;
            slot = document.createElement('div');
            slot.className = 'msg-indicator-slot';
            infoDiv.appendChild(slot);
          }
          if (mc && mc.total > 0) {
            slot.innerHTML = `<div title="${mc.unread} unread / ${mc.total} total message${mc.total!==1?'s':''}" style="display:inline-flex;align-items:center;gap:3px;margin-top:2px">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="${mc.unread > 0 ? '#c084fc' : 'var(--textMuted)'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              ${mc.unread > 0 ? `<span style="font-size:10px;color:#c084fc;font-weight:700">${mc.unread} unread</span>` : `<span style="font-size:10px;color:var(--textMuted);font-weight:600">${mc.total} sent</span>`}
            </div>`;
          } else {
            slot.innerHTML = '';
          }
        });
      } catch(e) { /* non-critical */ }
    }

    // ============================================================
    // HELPERS
    // ============================================================
    function getUserStatus(u) {
      if (u.isDisabled) return { label:'Disabled', cls:'status-disabled', color:'var(--textMuted)' };
      if (!u.expiryDate) return { label:'No Access', cls:'status-none', color:'var(--textMuted)' };
      const now = new Date();
      const exp = u.expiryDate.toDate();
      const diff = Math.ceil((exp - now) / (1000*60*60*24));
      if (diff <= 0) return { label:'Expired', cls:'status-expired', color:'var(--red)' };
      if (diff <= 3) return { label:'Expiring', cls:'status-expiring', color:'var(--orange)' };
      return { label:'Active', cls:'status-active', color:'var(--green)' };
    }

    function getDaysLeft(u) {
      if (u.isDisabled || !u.expiryDate) return null;
      const diff = Math.ceil((u.expiryDate.toDate() - new Date()) / (1000*60*60*24));
      return Math.max(0, diff);
    }

    function formatDate(ts) {
      if (!ts) return 'N/A';
      return new Date(ts.toDate()).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    function filterUsers() {
      const now = new Date();
      let list = [...state.users];
      // Status filter
      if (state.activeFilter === 'active') list = list.filter(u => !u.isDisabled && u.expiryDate && u.expiryDate.toDate() > now);
      else if (state.activeFilter === 'expired') list = list.filter(u => !u.isDisabled && u.expiryDate && u.expiryDate.toDate() <= now);
      else if (state.activeFilter === 'disabled') list = list.filter(u => u.isDisabled);
      else if (state.activeFilter === 'noAccess') list = list.filter(u => !u.expiryDate && !u.isDisabled);
      // Search filter
      const q = state.searchQuery.toLowerCase().trim();
      if (q) {
        list = list.filter(u =>
          (u.email || '').toLowerCase().includes(q) ||
          (u.displayName || '').toLowerCase().includes(q) ||
          (u.gbUsername || '').toLowerCase().includes(q)
        );
      }
      state.filteredUsers = list;
      state.displayCount = 20;
    }

    function getFilterCounts() {
      const now = new Date();
      return {
        all: state.users.length,
        active: state.users.filter(u => !u.isDisabled && u.expiryDate && u.expiryDate.toDate() > now).length,
        expired: state.users.filter(u => !u.isDisabled && u.expiryDate && u.expiryDate.toDate() <= now).length,
        disabled: state.users.filter(u => u.isDisabled).length,
        noAccess: state.users.filter(u => !u.expiryDate && !u.isDisabled).length,
      };
    }

    function showToast(msg, type) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ============================================================
    // RENDER ENGINE
    // ============================================================
    function render() {
      const app = $('#app');
      switch(state.view) {
        case 'loading': app.innerHTML = renderLoading(); break;
        case 'login': app.innerHTML = renderLogin(); bindLogin(); break;
        case 'denied': app.innerHTML = renderDenied(); break;
        case 'dashboard': app.innerHTML = renderHeader() + renderDashboard(); bindDashboard(); break;
        case 'userDetail': app.innerHTML = renderHeader() + renderUserDetailPage(); bindUserDetailPage(); break;
        case 'subRevPage': app.innerHTML = renderHeader() + renderSubRevFullPage(); bindSubRevPage(); break;
      }
    }

    // ============================================================

      return `<div class="loading-page">
        <div style="text-align:center">
          <div class="spinner"></div>
          <span style="color:var(--textMuted);font-family:'Orbitron',monospace;font-size:13px">Loading...</span>
        </div>
      </div>`;
    }

          const provider = new firebase.auth.GoogleAuthProvider();
          try {
            await auth.signInWithPopup(provider);
          } catch (popupErr) {
            if (popupErr.code === 'auth/popup-blocked' ||
                popupErr.code === 'auth/cancelled-popup-request' ||
                popupErr.code === 'auth/operation-not-supported-in-this-environment') {
              await auth.signInWithRedirect(provider);
            } else {
              throw popupErr;
            }
          }
        } catch(e) {
          const err = $('#loginError');
          err.classList.remove('hidden');
          err.textContent = e.message || 'Sign in failed';
          btn.innerHTML = 'Sign in with Google';
          btn.disabled = false;
        }
      };
    }

    // ============================================================
    // RENDER: HEADER
    // ============================================================
    function renderHeader() {
      const logoB64 = document.querySelector('.login-logo img')?.src || '';
      return `
      <!-- Mobile sidebar overlay + drawer — present on every page -->
      <div class="mobile-sidebar-overlay" id="mobileSidebarOverlay"></div>
      <div class="mobile-sidebar" id="mobileSidebar">
        <div style="font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--purpleLight);margin-bottom:16px;letter-spacing:1px">DASHBOARD</div>
        <div id="mobileSidebarContent">${renderSidebar()}</div>
      </div>
      <div class="header">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="mobile-hamburger" id="mobileMenuBtn" style="background:none;border:none;cursor:pointer;padding:5px">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--textSecondary)" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
          </button>
          <div class="header-logo">
            <div class="header-logo-icon" style="overflow:hidden;padding:0">
              <img src="icon-192.png" alt="GB" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none';this.parentNode.innerHTML='🎮'"/>
            </div>
            <div>
              <div style="font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:2px;
                background:linear-gradient(135deg,#ef4444,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent">ADMIN</div>
              <div style="font-size:10px;color:var(--textMuted);letter-spacing:1px">ACCESS MANAGER</div>
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <a href="https://gamepointsmanager.github.io/Game/" style="padding:6px 14px;border-radius:8px;border:1.5px solid rgba(124,58,237,0.45);background:rgba(124,58,237,0.1);color:var(--purpleLight);font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;font-family:'Rajdhani',sans-serif">SweepAdmin</a>
        </div>
      </div>`;
    }

    // ============================================================
    // RENDER: DASHBOARD
    // ============================================================
    function renderSidebar() {
      const c = getFilterCounts();
      const f = state.activeFilter;
      const chips = [
        { key:'all', label:'All Users', num:c.all, color:'var(--purpleLight)' },
        { key:'active', label:'Active', num:c.active, color:'#34d399' },
        { key:'expired', label:'Expired', num:c.expired, color:'#f87171' },
        { key:'disabled', label:'Disabled', num:c.disabled, color:'var(--textMuted)' },
        { key:'noAccess', label:'No Access', num:c.noAccess, color:'#fbbf24' },
      ];

      // Compute revenue total for mini card
      const { rows: revRows, total: revTotal } = getSubRevData();

      return chips.map(ch => `
        <div class="stat-chip ${f===ch.key?'active':''}" data-filter="${ch.key}">
          <div class="stat-chip-num" style="color:${ch.color}">${ch.num}</div>
          <div class="stat-chip-label">${ch.label}</div>
        </div>`).join('') +
        `<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--glassBorder)">
          <div style="font-size:10px;color:var(--textMuted);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:8px">Revenue</div>

          <!-- Revenue summary mini card -->
          <div style="border-radius:12px;background:linear-gradient(135deg,rgba(16,185,129,0.1),rgba(14,11,28,0.8));border:1.5px solid rgba(52,211,153,0.3);padding:12px 14px;margin-bottom:8px">
            <div style="font-size:10px;color:var(--textMuted);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px">Total Subscriptions</div>
            <div style="font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#34d399">$${revTotal.toFixed(2)}</div>
            <div style="font-size:11px;color:var(--textMuted);margin-top:2px">${revRows.length} paid account${revRows.length!==1?'s':''}</div>
            ${state.subRevFrom||state.subRevTo ? `<div style="font-size:10px;color:rgba(52,211,153,0.6);margin-top:3px;font-style:italic">${state.subRevFrom?new Date(state.subRevFrom).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'–'} → ${state.subRevTo?new Date(state.subRevTo).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'–'}</div>` : '<div style="font-size:10px;color:rgba(52,211,153,0.5);margin-top:3px">All time</div>'}
          </div>

          <!-- Navigate to full revenue page -->
          <div class="stat-chip sub-rev-chip" style="cursor:pointer;border:1.5px solid rgba(52,211,153,0.45);background:rgba(16,185,129,0.09);border-radius:10px;transition:all 0.2s" onmouseover="this.style.background='rgba(16,185,129,0.16)'" onmouseout="this.style.background='rgba(16,185,129,0.09)'">
            <div style="display:flex;align-items:center;gap:8px;width:100%">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" style="flex-shrink:0"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
              <div style="flex:1">
                <div style="font-size:13px;font-weight:700;color:#34d399">View Details</div>
                <div style="font-size:10px;color:var(--textMuted)">Subscription breakdown</div>
              </div>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--textMuted)" stroke-width="2"><polyline points="9,18 15,12 9,6"/></svg>
            </div>
          </div>

          <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--glassBorder)">
            <div style="font-size:10px;color:var(--textMuted);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px">Admin</div>
            <div style="font-size:12px;color:var(--textSecondary);line-height:1.8;margin-bottom:12px">${state.user?.email || ''}</div>
            <button onclick="firebase.auth().signOut()" style="width:100%;padding:9px 14px;border-radius:9px;border:1.5px solid rgba(239,68,68,0.45);background:rgba(239,68,68,0.1);color:#f87171;font-size:13px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;text-align:left;display:flex;align-items:center;gap:8px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
          </div>
        </div>`;
    }

    function renderDashboard() {
      const visible = state.filteredUsers.slice(0, state.displayCount);
      const hasMore = state.filteredUsers.length > state.displayCount;

      const list = visible.map(u => {
        const status = getUserStatus(u);
        const daysLeft = getDaysLeft(u);
        const initial = (u.displayName || u.email || '?')[0].toUpperCase();
        const avatar = u.photoURL
          ? `<img src="${u.photoURL}" alt="" referrerpolicy="no-referrer"/>`
          : initial;

        return `<div class="user-item" data-uid="${u.uid}">
          <div class="user-avatar">${avatar}</div>
          <div class="user-info">
            <div class="user-name">${u.displayName || 'No Name'}</div>
            <div class="user-email">${u.email || 'No Email'}</div>
            ${u.gbUsername ? '<div style="font-size:11px;color:#22d3ee;font-weight:600;margin-top:1px">@' + u.gbUsername + '</div>' : ''}
            <div class="msg-indicator-slot"></div>
          </div>
          <div class="user-item-status">
            ${daysLeft !== null && daysLeft > 0 ? `<div style="font-family:'Orbitron',monospace;font-size:13px;color:${status.color};margin-bottom:2px;white-space:nowrap">${daysLeft > 36000 ? '∞' : daysLeft + 'd'}</div>` : ''}
            <span class="user-status ${status.cls}">${status.label}</span>
          </div>
        </div>`;
      }).join('');

      return `
      <div class="admin-layout fade-in">
        <div class="admin-sidebar" id="desktopSidebar">
          <div style="font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--purpleLight);margin-bottom:16px;letter-spacing:1px">DASHBOARD</div>
          <div id="desktopSidebarContent">${renderSidebar()}</div>
        </div>
        <div class="admin-main">
          <div style="margin-bottom:16px">
            <div class="search-wrapper">
              <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
              <input type="text" class="search-box" id="searchInput" placeholder="Search by username, email or name..." value="${state.searchQuery}" />
            </div>
          </div>
          <div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:12px;color:var(--textMuted)">${state.filteredUsers.length} user${state.filteredUsers.length !== 1 ? 's' : ''}${state.activeFilter !== 'all' ? ' · ' + state.activeFilter : ''}</span>
            <button class="btn btn-purple" id="broadcastAllBtn" style="font-size:11px;padding:7px 13px;font-weight:800"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-1px;margin-right:4px"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>Broadcast to All</button>
          </div>
          <div id="userList">
            ${list || '<div style="text-align:center;padding:40px;color:var(--textMuted);font-size:14px">No users found</div>'}
          </div>
          ${hasMore ? '<div id="loadMoreBtn" style="text-align:center;padding:16px"><button class="btn btn-purple" style="width:100%;max-width:300px">Load more (' + (state.filteredUsers.length - state.displayCount) + ' remaining)</button></div>' : ''}
        </div>
      </div>`;
    }

    function bindDashboard() {
      bindMobileMenu();
      // Search
      const search = $('#searchInput');
      if (search) {
        search.oninput = (e) => {
          state.searchQuery = e.target.value;
          filterUsers();
          render();
          const s2 = $('#searchInput');
          if (s2) { s2.focus(); s2.selectionStart = s2.selectionEnd = state.searchQuery.length; }
        };
      }
      // Stat chip filters (both desktop and mobile)
      document.querySelectorAll('.stat-chip').forEach(chip => {
        if (!chip.dataset.filter) return;
        chip.onclick = () => {
          state.activeFilter = chip.dataset.filter;
          filterUsers();
          document.getElementById('mobileSidebar')?.classList.remove('open');
          document.getElementById('mobileSidebarOverlay')?.classList.remove('open');
          render();
        };
      });
      // Lazy load more
      const loadMore = document.getElementById('loadMoreBtn');
      if (loadMore) loadMore.onclick = () => { state.displayCount += 20; render(); };
      // Broadcast to all
      const broadcastAllBtn = document.getElementById('broadcastAllBtn');
      if (broadcastAllBtn) broadcastAllBtn.onclick = () => showBroadcastAllModal();
      // Sub-rev set cost buttons
      document.querySelectorAll('.set-cost-btn').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          showSetCostModal(btn.dataset.uid, btn.dataset.name);
        };
      });
      // User clicks
      document.querySelectorAll('.user-item').forEach(el => {
        el.onclick = () => { openUserDetail(el.dataset.uid); };
      });
    }

    // ============================================================
    // RENDER: USER DETAIL PAGE
    // ============================================================
    function renderUserDetailPage() {
      const u = state.selectedUser;
      if (!u) return '<div style="padding:40px;text-align:center;color:var(--textMuted)">No user selected</div>';

      const status = getUserStatus(u);
      const daysLeft = getDaysLeft(u);
      const initial = (u.displayName || u.email || '?')[0].toUpperCase();
      const avatar = u.photoURL
        ? `<img src="${u.photoURL}" style="width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid rgba(124,58,237,0.45)" referrerpolicy="no-referrer"/>`
        : `<div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;border:2px solid rgba(124,58,237,0.45);flex-shrink:0">${initial}</div>`;

      const fmtTs = (ts) => {
        if (!ts) return '<span style="color:#f87171">Not available</span>';
        try {
          const d = ts.toDate ? ts.toDate() : new Date(ts.seconds ? ts.seconds * 1000 : ts);
          if (isNaN(d.getTime())) return '<span style="color:#f87171">Invalid</span>';
          const now = new Date(); const diffMs = now - d;
          const mins = Math.floor(diffMs/60000); const hrs = Math.floor(diffMs/3600000); const days = Math.floor(diffMs/86400000);
          let ago = '';
          if (diffMs < 0) ago = '<span style="color:var(--textMuted)">In the future</span>';
          else if (mins < 1) ago = '<span style="color:#34d399;font-weight:700">Just now</span>';
          else if (mins < 60) ago = '<span style="color:#34d399;font-weight:700">' + mins + 'm ago</span>';
          else if (hrs < 24) ago = '<span style="color:#fbbf24;font-weight:700">' + hrs + 'h ago</span>';
          else if (days < 7) ago = '<span style="color:#fb7185;font-weight:700">' + days + 'd ago</span>';
          else ago = '<span style="color:var(--textSecondary)">' + d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + '</span>';
          const exact = d.toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
          return ago + '<span style="font-size:11px;color:var(--textMuted);display:block;margin-top:1px">' + exact + '</span>';
        } catch(e) { return '<span style="color:#f87171">Error</span>'; }
      };

      const isUnlimited = u.expiryDate && daysLeft !== null && daysLeft > 36000;

      return `<div class="user-detail-page fade-in">
        <!-- Back + Title -->
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px">
          <button id="backBtn" class="btn btn-purple" style="padding:8px 14px;font-size:12px;font-weight:700;flex-shrink:0">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-2px;margin-right:4px"><polyline points="15,18 9,12 15,6"/></svg>Back
          </button>
          <h2 style="font-family:'Orbitron',monospace;font-size:15px;font-weight:800;color:#c4b5fd;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Manage User</h2>
        </div>

        <!-- Profile Card -->
        <div class="detail-section" style="background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(14,11,28,0.95));border-color:rgba(124,58,237,0.35)">
          <div style="display:flex;align-items:flex-start;gap:14px;flex-wrap:nowrap">
            <div style="flex-shrink:0">${avatar}</div>
            <div style="flex:1;min-width:0;overflow:hidden">
              <div style="font-size:18px;font-weight:800;color:var(--textPrimary);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.displayName || 'No Name'}</div>
              <div style="font-size:12px;color:var(--textSecondary);font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.email || ''}</div>
              ${u.gbUsername ? '<div style="font-size:13px;color:#22d3ee;font-weight:700">@' + u.gbUsername + '</div>' : '<div style="font-size:11px;color:#f87171;font-weight:600">No username set</div>'}
            </div>
            <div style="flex-shrink:0;text-align:center;padding:10px 12px;border-radius:10px;background:rgba(20,16,40,0.6);border:1.5px solid rgba(130,105,215,0.3);min-width:70px">
              <div style="font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:${status.color};line-height:1">${isUnlimited ? '∞' : (daysLeft !== null ? daysLeft : '0')}</div>
              <div style="font-size:9px;color:var(--textMuted);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-top:3px;margin-bottom:5px">${isUnlimited ? 'Unlimited' : 'Days Left'}</div>
              <span class="user-status ${status.cls}" style="font-size:9px;padding:2px 7px;display:inline-block">${status.label}</span>
            </div>
          </div>
        </div>

        <!-- Account Info -->
        <div class="detail-section">
          <div class="detail-section-title"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#c4b5fd" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>Account Info</div>
          <div class="detail-grid">
            <div class="detail-info-row"><span class="detail-info-label">UID</span><span class="detail-info-value" style="font-family:monospace;font-size:11px">${u.uid}</span></div>
            <div class="detail-info-row"><span class="detail-info-label">Status</span><span class="detail-info-value"><span class="user-status ${status.cls}">${status.label}</span></span></div>
            <div class="detail-info-row"><span class="detail-info-label">Expires</span><span class="detail-info-value">${u.expiryDate ? (isUnlimited ? '♾️ Unlimited' : formatDate(u.expiryDate)) : 'Not set'}</span></div>
            <div class="detail-info-row"><span class="detail-info-label">Last Login</span><span class="detail-info-value">${fmtTs(u.lastLogin)}</span></div>
            <div class="detail-info-row"><span class="detail-info-label">Registered</span><span class="detail-info-value">${fmtTs(u.createdAt)}</span></div>
            <div class="detail-info-row"><span class="detail-info-label">Disabled</span><span class="detail-info-value" style="color:${u.isDisabled?'#f87171':'#34d399'}">${u.isDisabled ? 'Yes' : 'No'}</span></div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="detail-section">
          <div class="detail-section-title" style="color:#fbbf24"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Quick Actions</div>
          <div class="btn-row" style="margin-bottom:0">
            <button class="btn btn-gold" id="freeTrialBtn" style="font-weight:800"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px"><path d="M20 12v10H4V12"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/></svg>Free Trial (3 days)</button>
            <button class="btn btn-emerald" id="unlimitedBtn" style="font-weight:800"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px"><path d="M18.178 8c5.096 0 5.096 8 0 8-5.095 0-7.133-8-12.739-8-4.585 0-4.585 8 0 8 5.606 0 7.644-8 12.74-8z"/></svg>Unlimited Access</button>
          </div>
        </div>

        <!-- Extend Access -->
        <div class="detail-section">
          <div class="detail-section-title" style="color:#34d399"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Extend Access</div>
          <div class="btn-row" style="margin-bottom:12px">
            <button class="btn btn-green extend-btn" data-days="7" style="font-weight:700">+7 Days</button>
            <button class="btn btn-blue extend-btn" data-days="30" style="font-weight:700">+30 Days</button>
            <button class="btn btn-purple extend-btn" data-days="90" style="font-weight:700">+90 Days</button>
            <button class="btn btn-cyan extend-btn" data-days="365" style="font-weight:700">+1 Year</button>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="number" id="customDays" min="1" max="3650" placeholder="Custom days (1–3650)" style="flex:1;padding:10px 14px;border-radius:10px;border:1.5px solid rgba(110,90,175,0.45);background:var(--bgInput);color:var(--textPrimary);font-size:14px;font-weight:600;outline:none;font-family:'Rajdhani',sans-serif;max-width:220px"/>
            <button class="btn btn-orange" id="customExtendBtn" style="font-weight:800;white-space:nowrap">Add Days</button>
          </div>
        </div>

        <!-- Subscription Cost -->
        <div class="detail-section" style="border-color:rgba(52,211,153,0.3)">

          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-radius:10px;background:rgba(16,185,129,0.06);border:1px solid rgba(52,211,153,0.2);margin-bottom:12px">
            <div>
              ${u.subscriptionCost && u.subscriptionCost > 0 ? `
                <div style="font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#34d399">$${Number(u.subscriptionCost).toFixed(2)}</div>
                ${u.subPeriodStart && u.subPeriodEnd ? (() => {
                  const s = (u.subPeriodStart.toDate ? u.subPeriodStart.toDate() : new Date(u.subPeriodStart)).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
                  const e = (u.subPeriodEnd.toDate   ? u.subPeriodEnd.toDate()   : new Date(u.subPeriodEnd)).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
                  return `<div style="font-size:11px;color:var(--textMuted);margin-top:3px">${s} → ${e}</div>`;
                })() : '<div style="font-size:11px;color:var(--textMuted)">No period set</div>'}

          <button class="btn btn-blue" id="downloadDataBtn" style="font-weight:800"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download User Data</button>
        </div>

        <!-- Send Popup Message -->
        <div class="detail-section" style="border-color:rgba(168,85,247,0.3)">
          <div class="detail-section-title" style="color:#c084fc"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#c084fc" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>Send Popup Message</div>

            </button>

    async function loadMessageStatus(uid) {
      const container = document.getElementById('msgStatusContent');
      if (!container) return;
      try {
        const [userMsgs, allMsgs] = await Promise.all([
          db.collection('popupMessages').where('targetUid','==',uid).limit(20).get(),
          db.collection('popupMessages').where('targetAll','==',true).limit(10).get()
        ]);
        const seen = new Set();
        const docs = [];
        for (const doc of [...userMsgs.docs, ...allMsgs.docs]) {
          if (seen.has(doc.id)) continue;
          seen.add(doc.id);
          docs.push(doc);
        }
        docs.sort((a,b) => (b.data().createdAt?.seconds||0) - (a.data().createdAt?.seconds||0));

        if (docs.length === 0) {
          container.innerHTML = '<span style="color:var(--textMuted);font-size:13px">No messages sent yet</span>';
          return;
        }

        const typeColors = { info:'#60a5fa', success:'#34d399', warning:'#fbbf24', error:'#f87171' };
        const typeLabels = { info:'INFO', success:'SUCCESS', warning:'WARNING', error:'ALERT' };

        container.innerHTML = docs.map(doc => {
          const d = doc.data();
          const dateStr = d.createdAt
            ? new Date(d.createdAt.seconds*1000).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
            : 'Sending…';
          const col = typeColors[d.type] || '#60a5fa';
          const typeLabel = typeLabels[d.type] || (d.type||'INFO').toUpperCase();

          // Status logic:
          // read:true  → user tapped "Got it — Dismiss" (fully dismissed)
          // dismissed:true AND read:false → user tapped "Remind Later" (snoozed client-side; dismissed flag may not be set server-side in remind flow)
          // both false → pending, not yet seen
          let statusDot, statusLabel;
          if (d.read) {
            // read:true means fully dismissed/acknowledged
            statusDot = '#34d399';
            statusLabel = '<span style="color:#34d399;font-weight:700;display:inline-flex;align-items:center;gap:4px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>Dismissed / Read</span>';
          } else if (d.dismissed) {
            // dismissed but not read → remind later was pressed (legacy path or server-set)
            statusDot = '#fbbf24';
            statusLabel = '<span style="color:#fbbf24;font-weight:700;display:inline-flex;align-items:center;gap:4px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>Remind Later</span>';
          } else {
            statusDot = 'rgba(148,163,184,0.45)';
            statusLabel = '<span style="color:var(--textMuted);font-weight:600;display:inline-flex;align-items:center;gap:4px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 14,14"/></svg>Pending</span>';
          }

          const scope = d.targetAll
            ? '<span style="font-size:10px;background:rgba(124,58,237,0.15);color:#a78bfa;border:1px solid rgba(124,58,237,0.3);padding:1px 7px;border-radius:20px;margin-left:6px;font-weight:700">BROADCAST</span>'
            : '';

          const safeMsg = String(d.message||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          const linkedMsg = safeMsg.replace(/(https?:\/\/[^\s<>"']+)/g,
            url => `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color:#60a5fa;word-break:break-all">${url}</a>`);

          // Encode message for send-again (base64 to avoid quote issues)
          const encodedMsg = btoa(unescape(encodeURIComponent(d.message||'')));
          const msgType = d.type || 'info';

          return `<div id="msgrow-${doc.id}" style="padding:11px 13px;border-radius:11px;background:rgba(20,16,44,0.6);border:1px solid rgba(110,90,175,0.22);margin-bottom:8px">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px">
              <div style="display:flex;align-items:center;gap:6px">
                <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${statusDot};flex-shrink:0"></span>
                <span style="font-size:11.5px;color:${col};font-weight:700">${typeLabel}${scope}</span>
              </div>
              <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
                <span style="font-size:11px;color:var(--textMuted)">${dateStr}</span>
                <button onclick="sendAgainPopup('${doc.id}','${msgType}','${encodedMsg}')" title="Send Again" style="padding:3px 8px;border-radius:6px;border:1px solid rgba(124,58,237,0.35);background:rgba(124,58,237,0.1);color:#c084fc;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;display:flex;align-items:center;gap:3px;white-space:nowrap">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>Again
                </button>
                <button onclick="deletePopupMessage('${doc.id}')" title="Delete" style="width:22px;height:22px;border-radius:6px;border:1px solid rgba(239,68,68,0.35);background:rgba(239,68,68,0.1);color:#f87171;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M9,6V4h6v2"/></svg>
                </button>
              </div>
            </div>
            <div style="font-size:13px;color:var(--textPrimary);font-weight:600;line-height:1.5;margin-bottom:5px;word-break:break-word">${linkedMsg}</div>
            <div style="font-size:11.5px">${statusLabel}</div>
          </div>`;
        }).join('');

      } catch(e) {
        console.error('loadMessageStatus error:', e);
        container.innerHTML = `<span style="color:#f87171;font-size:13px">Failed to load: ${e.message}</span>`;
      }
    }

    async function sendAgainPopup(originalDocId, msgType, encodedMsg) {
      const uid = state.selectedUser?.uid;
      if (!uid) return;
      try {
        const message = decodeURIComponent(escape(atob(encodedMsg)));
        await db.collection('popupMessages').add({
          targetUid: uid,
          targetAll: false,
          message,
          type: msgType,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          read: false,
          dismissed: false,
          sentBy: state.user?.email || 'admin'
        });
        showToast('✅ Message resent!', 'success');
        setTimeout(() => loadMessageStatus(uid), 800);
      } catch(e) {
        showToast('❌ Failed: ' + e.message, 'error');
      }
    }

    async function deleteAllUserMessages(uid) {
      if (!confirm('Delete ALL messages for this user? This cannot be undone.')) return;
      try {
        const snap = await db.collection('popupMessages').where('targetUid','==',uid).get();
        const batch = db.batch();
        snap.docs.forEach(d => batch.delete(d.ref));
        await batch.commit();
        const container = document.getElementById('msgStatusContent');
        if (container) container.innerHTML = '<span style="color:var(--textMuted);font-size:13px">No messages sent yet</span>';
        showToast(`✅ Deleted ${snap.size} message${snap.size!==1?'s':''}`, 'success');
      } catch(e) {
        showToast('❌ Failed: ' + e.message, 'error');
      }
    }

    async function deletePopupMessage(docId) {
      if (!confirm('Delete this message?')) return;
      try {
        await db.collection('popupMessages').doc(docId).delete();
        const row = document.getElementById('msgrow-' + docId);
        if (row) row.remove();
        const container = document.getElementById('msgStatusContent');
        if (container && !container.querySelector('[id^="msgrow-"]')) {
          container.innerHTML = '<span style="color:var(--textMuted);font-size:13px">No messages sent yet</span>';
        }
        showToast('Message deleted', 'success');
      } catch(e) {
        showToast('❌ Delete failed: ' + e.message, 'error');
      }
    }

    function closeModal() {
      state.modalOpen = false;
      state.selectedUser = null;

    async function extendAccess(days) {
      const u = state.selectedUser;
      if (!u) return;
      try {
        const now = new Date();
        let base = now;
        if (u.expiryDate) {
          const existing = u.expiryDate.toDate();
          if (existing > now) base = existing;
        }
        const newExpiry = new Date(base.getTime() + days * 24 * 60 * 60 * 1000);

        // Auto-set subscription period to match the access period
        const startTs = firebase.firestore.Timestamp.fromDate(base);
        const endTs   = firebase.firestore.Timestamp.fromDate(newExpiry);

        await db.collection('userAccess').doc(u.uid).update({
          expiryDate:     firebase.firestore.Timestamp.fromDate(newExpiry),
          isDisabled:     false,
          subPeriodStart: startTs,
          subPeriodEnd:   endTs,
        });

        showToast(`✅ Extended by ${days} days`, 'success');
        closeUserDetail();
      } catch(e) {
        showToast('❌ Failed: ' + e.message, 'error');
      }
    }

    async function toggleDisable() {
      const u = state.selectedUser;
      if (!u) return;
      try {
        const newState = !u.isDisabled;
        await db.collection('userAccess').doc(u.uid).update({
          isDisabled: newState,
        });
        showToast(newState ? '🚫 User disabled' : '✅ User enabled', 'success');
        closeUserDetail();
      } catch(e) {
        showToast('❌ Failed: ' + e.message, 'error');
      }
    }

    async function revokeAccess() {
      const u = state.selectedUser;
      if (!u) return;
      if (!confirm(`Remove all access for ${u.email}?\nThis will set their expiry to none.`)) return;
      try {
        await db.collection('userAccess').doc(u.uid).update({
          expiryDate: null,
          isDisabled: false,
        });
        showToast('🗑️ Access revoked', 'success');
        closeUserDetail();
      } catch(e) {
        showToast('❌ Failed: ' + e.message, 'error');
      }
    }
